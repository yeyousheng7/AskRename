name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must start with v, e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Validate tag format
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v ]]; then
            echo "Tag must start with 'v'. Got: ${RELEASE_TAG}"
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Remove .npmrc (Force official registry)
              shell: bash
              run: rm -f .npmrc

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # 使用 npm_config_ 前缀，这比普通环境变量优先级更高，能覆盖残留配置
          npm_config_electron_mirror: "https://github.com/electron/electron/releases/download/"
          npm_config_electron_builder_binaries_mirror: "https://github.com/electron-userland/electron-builder-binaries/releases/download/"
